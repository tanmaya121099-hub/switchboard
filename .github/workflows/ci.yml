name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install (bench core + dev tools; agent extra not needed for tests)
        run: uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q
